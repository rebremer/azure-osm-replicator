#cloud-config
# ─────────────────────────────────────────────────────────────────────────────
# osm-import-vm cloud-init
# ─────────────────────────────────────────────────────────────────────────────
# Installs every tool update-osm.sh / init-osm.sh need:
#   - osm2pgsql            (apt: osm2pgsql)
#   - pyosmium-get-changes (apt: pyosmium)
#   - azcopy               (Microsoft repo: azcopy)
#   - postgresql-client    (apt: postgresql-client)
#   - azure-cli            (Microsoft script)
#   - jq, curl             (apt)
#
# Also formats + mounts the data disk on /mnt/data (Premium SSD), where
# nodes.bin, the source PBF, and the per-iteration diff live.
# ─────────────────────────────────────────────────────────────────────────────
package_update: true
package_upgrade: false

apt:
  sources:
    azure-cli:
      source: "deb [arch=amd64 signed-by=/etc/apt/keyrings/microsoft.gpg] https://packages.microsoft.com/repos/azure-cli noble main"
    microsoft-prod:
      source: "deb [arch=amd64 signed-by=/etc/apt/keyrings/microsoft.gpg] https://packages.microsoft.com/ubuntu/24.04/prod noble main"

packages:
  - ca-certificates
  - curl
  - gnupg
  - jq
  - postgresql-client
  - osm2pgsql
  - pyosmium
  - azcopy

write_files:
  - path: /etc/profile.d/osm-updater.sh
    permissions: '0644'
    content: |
      # Convenience defaults so interactive ssh sessions work like the script.
      export PGSSLMODE=require

runcmd:
  # Microsoft signing key for azure-cli + azcopy apt repos.
  - mkdir -p /etc/apt/keyrings
  - bash -c 'curl -fsSL https://packages.microsoft.com/keys/microsoft.asc | gpg --dearmor -o /etc/apt/keyrings/microsoft.gpg'
  - chmod a+r /etc/apt/keyrings/microsoft.gpg
  - apt-get update
  - apt-get install -y azure-cli azcopy

  # storage-blob-preview extension is required for `az storage blob tag list`
  # (used by update-osm.sh wait_for_scan to read Defender malware-scan tags).
  - su - osmadmin -c 'az config set extension.use_dynamic_install=yes_without_prompt'
  - su - osmadmin -c 'az extension add --name storage-blob-preview --yes --only-show-errors'

  # Format and mount the data disk (LUN 0 → /dev/disk/azure/scsi1/lun0)
  - bash -c 'set -e; DEV=$(readlink -f /dev/disk/azure/scsi1/lun0); if ! blkid "$DEV" >/dev/null 2>&1; then mkfs.ext4 -F -L osm-data "$DEV"; fi'
  - mkdir -p /mnt/data
  - bash -c 'grep -q "/mnt/data" /etc/fstab || echo "LABEL=osm-data /mnt/data ext4 defaults,nofail,discard 0 2" >> /etc/fstab'
  - mount -a
  - chown osmadmin:osmadmin /mnt/data

  # Working dir for update-osm.sh systemd unit (created later by you).
  - mkdir -p /var/lib/osm-updater
  - chown osmadmin:osmadmin /var/lib/osm-updater
